name: Check Econt schema

# Econt publishes its OpenAPI spec at https://ee.econt.com/services/openapi.yaml but
# offers no changelog feed. This job polls it weekly and opens a PR when it changed,
# so schema updates land via review rather than silently.

on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Fetch latest schema
        run: node gen/release.mjs

      - name: Open PR if the schema changed
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: chore/update-econt-schema
          commit-message: 'chore: update Econt OpenAPI schema'
          title: 'chore: update Econt OpenAPI schema'
          body: |
            The upstream Econt OpenAPI schema at ${{ '`https://ee.econt.com/services/openapi.yaml`' }} changed.

            This PR snapshots the new version under `versions/`, refreshes `openapi.yaml`,
            and updates `versions/index.json`. Review the diff before merging.
          add-paths: |
            openapi.yaml
            versions/
